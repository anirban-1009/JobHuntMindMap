repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.11
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest-check
        name: Run Tests
        entry: uv run pytest
        language: system
        types: [python]
        pass_filenames: false
        args: ["tests/"]
